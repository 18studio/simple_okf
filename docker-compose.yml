services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: okf_rag
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: SimpleOkfLocal123!
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "SimpleOkfLocal123!"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 40s

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  simple-okf:
    build:
      context: .
    image: simple-okf:local
    depends_on:
      clickhouse:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - okf_mcp/rag/.env.example
    volumes:
      - ./okf:/app/okf
      - ./artifacts:/app/artifacts
    command:
      - python
      - -m
      - okf_mcp
      - server
      - --transport
      - http
      - --host
      - 0.0.0.0
      - --port
      - "8000"

volumes:
  clickhouse-data:
  opensearch-data:
  qdrant-data:

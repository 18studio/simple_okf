services:
  simple-okf:
    build:
      context: .
    image: simple-okf:local
    ports:
      - "8000:8000"
    env_file:
      - okf_mcp/rag/.env.example
    volumes:
      - ./okf:/app/okf
      - ./artifacts:/app/artifacts
    command:
      - python
      - -m
      - okf_mcp
      - server
      - --transport
      - http
      - --host
      - 0.0.0.0
      - --port
      - "8000"
